<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS-Nearby</title>
    <link rel="stylesheet" href="CSS/head-foot.css">
    <link rel="stylesheet" href="CSS/form.css">
    <link rel="stylesheet" href="CSS/nearby.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="script/main.js" defer></script>
    <script src="script/form.js" defer></script>
    <script src="script/users.js" defer></script>
</head>
<body>
    
    <div id="header"></div>

    <div id="login-form"></div>

    <div class="container">

    <h2>📍 Nearby Libraries</h2>

    {% if libraries|length == 0 %}
        <p class="empty">No libraries found 😕</p>
    {% endif %}

    <div class="grid">

        {% for lib in libraries %}
        <div class="card">
            <h3>{{ lib.tags.name if lib.tags.name else "Library" }}</h3>

            <p>📍 Lat: {{ lib.lat }}</p>
            <p>📍 Lon: {{ lib.lon }}</p>

            <p class="distance">Within 5 KM</p>

            <button class="btn view-btn">View Details</button>
        </div>
        {% endfor %}

    </div>

</div>

    <div id="footer"></div>

</body>
</html>
