<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS-Nearby</title>
    <link rel="stylesheet" href="CSS/head-foot.css">
    <link rel="stylesheet" href="CSS/form.css">
    <link rel="stylesheet" href="CSS/nearby.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="script/main.js" defer></script>
    <script src="script/form.js" defer></script>
    <script src="script/users.js" defer></script>
</head>
<body>
    
    <div id="header"></div>

    <div class="container">

        <h2>📍 Nearby Libraries</h2>

        <div class="grid">
            
        </div>

    </div>

    <div id="footer"></div>


    <script>
    document.addEventListener("DOMContentLoaded", function () {

        let container = document.querySelector(".grid");
        let libraries = JSON.parse(localStorage.getItem("libraries")) || [];

        if (libraries.length === 0) {
            container.innerHTML = "<p class='empty'>No libraries found 😕</p>";
            return;
        }

        let html = "";

        libraries.forEach(lib => {
            html += `
            <div class="card">
                <h3>${lib.tags?.name || "Library"}</h3>
                <p>📍 Lat: ${lib.lat}</p>
                <p>📍 Lon: ${lib.lon}</p>
                <p class="distance">Within 5 KM</p>

                <button class="btn view-btn"
                    onclick="openMap(${lib.lat}, ${lib.lon})">
                    View on Map
                </button>
            </div>
            `;
        });

        container.innerHTML = html;

    });


    // 🔥 Google Maps open
    function openMap(lat, lon) {
        window.open(`https://www.google.com/maps?q=${lat},${lon}`, "_blank");
    }
    </script>

</body>
</html>
