<div class="form-overlay"></div>

<div class="box">
    <h2>Signup</h2>

    <!-- ✅ IMPORTANT: onsubmit -->
    <form id="form" class="login-form" onsubmit="registerUser(event)">

        <input type="text" id="library_name" placeholder="Library Name" required>
        <span></span>
        
        <input type="text" id="name" placeholder="Username" required>
        <span id="nameError"></span>

        <input type="email" id="email" placeholder="E-mail" required>
        <span id="mailError"></span>

        <input type="password" id="password" placeholder="Password" required>
        <span id="passError"></span>

        <input type="password" id="confirmpass" placeholder="Confirm Password" required>
        <span id="confirmError"></span>

        <label>
            <input type="checkbox" id="showpass"> Show Password
        </label>

        <!-- ✅ IMPORTANT: submit button -->
        <button type="submit">Register</button>

    </form>
</div>
