<div class="form-overlay"></div>

<!-- REGISTER (Librarian) -->
<div class="box">
    <h2>Signup</h2>

    <form id="form" class="login-form" onsubmit="registerUser(event)">
        
        <input type="text" id="library_name" placeholder="Library Name" required>
        
        <input type="text" id="name" placeholder="Username" required>
        <span id="nameError"></span>

        <input type="email" id="email" placeholder="E-mail" required>
        <span id="mailError"></span>

        <input type="password" id="password" placeholder="Password" required>
        <span id="passError"></span>

        <input type="password" id="confirmpass" placeholder="Confirm Password" required>
        <span id="confirmError"></span>

        <label>
            <input type="checkbox" id="showpass"> Show Password
        </label>

        <button type="submit">Register</button>

    </form>
</div>

<!-- STUDENT LOGIN -->
<div class="box1">
    <h2>Student Login</h2>

    <form class="login-form">
        <input type="text" placeholder="LIBRARY CODE">
        <input type="tel" placeholder="Number">
        <input type="text" placeholder="OTP">

        <button type="button">Login</button>
    </form>
</div>

<!-- TEACHER LOGIN -->
<div class="box2">
    <h2>Teacher Login</h2>

    <form class="login-form">
        <input type="text" placeholder="LIBRARY CODE">
        <input type="text" placeholder="EMP_ID">
        <input type="tel" placeholder="Number">
        <input type="text" placeholder="OTP">

        <button type="button">Login</button>
    </form>
</div>

<!-- LIBRARIAN LOGIN -->
<div class="box3">
    <h2>Librarian Login</h2>

    <form class="login-form" onsubmit="loginUser(event)">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>
</div>
